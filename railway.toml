[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# RTMP requires TCP port 1935 — enable in Railway service settings
# HTTP status/clip endpoint runs on PORT (Railway sets this automatically)
# ASSEMBLYAI_API_KEY must be set for live "Luna clip this" detection —
# without it, clip detection silently disables itself (logs a warning) but
# the actual stream, recording, and restreaming are unaffected.
